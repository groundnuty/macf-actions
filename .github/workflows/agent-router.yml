name: Agent Router (reusable)

# Callable reusable workflow. Consumers trigger it from their own workflow
# via `jobs.<id>.uses: groundnuty/macf-actions/.github/workflows/agent-router.yml@v1`.
# Events (issues, issue_comment, pull_request, pull_request_review) are declared
# in the caller, not here.

on:
  workflow_call:
    secrets:
      AGENT_SSH_KEY:
        description: SSH key for connecting to agent hosts
        required: true
      TS_OAUTH_CLIENT_ID:
        description: Tailscale OAuth client ID for the GitHub Actions runner
        required: true
      TS_OAUTH_SECRET:
        description: Tailscale OAuth secret for the GitHub Actions runner
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: read
  # checks: read needed by route-by-ci-completion (#6) to enumerate
  # check_runs in the completed suite so the notification can name the
  # first failing check (not just "CI failed").
  checks: read

jobs:

  # ─── LOAD CONFIG ───
  config:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.load.outputs.agents }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github/agent-config.json
          sparse-checkout-cone-mode: false

      - name: Load config
        id: load
        run: |
          echo "agents=$(jq -c '.agents' .github/agent-config.json)" >> "$GITHUB_OUTPUT"

  # ─── LABEL ROUTING ───
  route-by-label:
    needs: config
    if: >
      (github.event_name == 'issues') &&
      (github.event.action == 'labeled') &&
      (github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    env:
      AGENT_SSH_KEY: ${{ secrets.AGENT_SSH_KEY }}
      AGENTS: ${{ needs.config.outputs.agents }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Route to agent by label
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_LABEL: ${{ github.event.label.name }}
          ACTOR: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail

          LABEL="$EVENT_LABEL"
          HOST=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].host // empty')
          if [ -z "$HOST" ]; then
            echo "Label '$LABEL' is not an agent label, skipping"
            exit 0
          fi

          APP_NAME=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].app_name // empty')
          if [ "$ACTOR" = "${APP_NAME}[bot]" ]; then
            echo "Actor is the same agent, skipping self-routing"
            exit 0
          fi

          SESSION=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].tmux_session')
          WINDOW=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].tmux_window // empty')
          SSH_USER=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].ssh_user')
          TMUX_BIN=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].tmux_bin // "tmux"')
          WORKSPACE_DIR=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].workspace_dir // empty')

          # Build the tmux target: "session" or "session:window" if a
          # tmux_window is configured. Lets multiple peers of one project
          # share a session with per-agent windows (see groundnuty/macf#69).
          if [ -n "$WINDOW" ]; then
            TARGET="${SESSION}:${WINDOW}"
          else
            TARGET="$SESSION"
          fi

          PROMPT="Please work on issue #${ISSUE_NUMBER}. Run: gh issue view ${ISSUE_NUMBER} --json title,body,labels,comments"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$AGENT_SSH_KEY" > ~/.ssh/id_agent
          chmod 600 ~/.ssh/id_agent

          # Prefer the canonical helper at $WORKSPACE_DIR/.claude/scripts/tmux-send-to-claude.sh
          # (shipped by groundnuty/macf:scripts/ and distributed by macf init
          # / macf update). Falls back to the inline submit pattern for
          # configs without workspace_dir (pre-v1.2 schema). The fallback
          # is kept in lock-step with the helper contents — keep the two
          # in sync. See groundnuty/macf#71.
          #
          # Shell-quoting caveat: the helper invocation passes $TARGET and
          # $PROMPT via single-quoted args inside the remote ssh command.
          # Current PROMPT contents interpolate only issue numbers and
          # GitHub-supplied REF strings (all safe — no single quotes).
          # If PROMPT ever grows to include user-controlled text (issue
          # body, comment body, etc.), switch to `bash -s` + heredoc-stdin
          # or escape single quotes before passing — otherwise a prompt
          # containing `'` would break the remote parse.
          HELPER="${WORKSPACE_DIR}/.claude/scripts/tmux-send-to-claude.sh"
          if [ -n "$WORKSPACE_DIR" ] && ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
            "${TMUX_BIN} has-session -t ${SESSION} 2>/dev/null && test -x '${HELPER}'" 2>/dev/null; then
            # Helper path: one SSH invocation that runs the canonical script
            # with the target and prompt as args. Single source of truth.
            if ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
              "'${HELPER}' '${TARGET}' '${PROMPT}'"; then
              echo "Routed issue #${ISSUE_NUMBER} to ${LABEL} via helper (target=${TARGET})"
            else
              echo "Agent ${LABEL} helper invocation failed"
              gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "agent-offline"
            fi
          elif ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
            "${TMUX_BIN} has-session -t ${SESSION} 2>/dev/null \
              && ${TMUX_BIN} send-keys -t ${TARGET} C-u \
              && ${TMUX_BIN} send-keys -t ${TARGET} '${PROMPT}' Enter \
              && sleep 1 \
              && ${TMUX_BIN} send-keys -t ${TARGET} Enter"; then
            echo "Routed issue #${ISSUE_NUMBER} to ${LABEL} via inline (target=${TARGET})"
          else
            echo "Agent ${LABEL} is offline or unreachable"
            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "agent-offline"
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
              --body "Agent \`${APP_NAME}[bot]\` is offline. Issue will be picked up when the agent starts."
          fi

  # ─── @MENTION ROUTING ───
  route-by-mention:
    needs: config
    if: >
      (github.event_name == 'issue_comment') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review')
    runs-on: ubuntu-latest
    env:
      AGENT_SSH_KEY: ${{ secrets.AGENT_SSH_KEY }}
      AGENTS: ${{ needs.config.outputs.agents }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Route to mentioned agents
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            BODY="$COMMENT_BODY"
            ACTOR="$COMMENT_USER"
            REF="issue #${ISSUE_NUMBER}"
            VIEW_NUM="$ISSUE_NUMBER"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            BODY="$PR_BODY"
            ACTOR="$PR_USER"
            REF="PR #${PR_NUMBER}"
            VIEW_NUM="$PR_NUMBER"
          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            BODY="$REVIEW_BODY"
            ACTOR="$REVIEW_USER"
            REF="PR #${PR_NUMBER}"
            VIEW_NUM="$PR_NUMBER"
          else
            BODY="$COMMENT_BODY"
            ACTOR="$COMMENT_USER"
            REF="PR #${PR_NUMBER}"
            VIEW_NUM="$PR_NUMBER"
          fi

          if [ "$ACTOR" = "github-actions[bot]" ]; then
            echo "Comment from github-actions[bot], skipping"
            exit 0
          fi

          for AGENT_NAME in $(echo "$AGENTS" | jq -r 'keys[]'); do
            APP_NAME=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].app_name // empty')

            if [ "$ACTOR" = "${APP_NAME}[bot]" ]; then
              continue
            fi

            if echo "$BODY" | grep -qE "@(${AGENT_NAME}|${APP_NAME})\[bot\]"; then
              HOST=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].host')
              SESSION=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].tmux_session')
              WINDOW=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].tmux_window // empty')
              SSH_USER=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].ssh_user')
              TMUX_BIN=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].tmux_bin // "tmux"')
              WORKSPACE_DIR=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].workspace_dir // empty')

              # Same session/window target construction as route-by-label.
              if [ -n "$WINDOW" ]; then
                TARGET="${SESSION}:${WINDOW}"
              else
                TARGET="$SESSION"
              fi

              MENTION_PROMPT="You were mentioned in ${REF}. Please check and respond: gh issue view ${VIEW_NUM} --repo ${REPO} --json title,body,comments"

              mkdir -p ~/.ssh && chmod 700 ~/.ssh
              echo "$AGENT_SSH_KEY" > ~/.ssh/id_agent
              chmod 600 ~/.ssh/id_agent

              # Helper invocation path (see route-by-label for rationale).
              # Falls back to inline when workspace_dir is unset or the
              # helper isn't executable at that path.
              HELPER="${WORKSPACE_DIR}/.claude/scripts/tmux-send-to-claude.sh"
              if [ -n "$WORKSPACE_DIR" ] && ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
                -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
                "${TMUX_BIN} has-session -t ${SESSION} 2>/dev/null && test -x '${HELPER}'" 2>/dev/null; then
                if ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
                  -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
                  "'${HELPER}' '${TARGET}' '${MENTION_PROMPT}'"; then
                  echo "Routed mention to ${AGENT_NAME} via helper (target=${TARGET})"
                else
                  echo "Agent ${AGENT_NAME} helper invocation failed"
                fi
              elif ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
                -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
                "${TMUX_BIN} has-session -t ${SESSION} 2>/dev/null \
                  && ${TMUX_BIN} send-keys -t ${TARGET} C-u \
                  && ${TMUX_BIN} send-keys -t ${TARGET} '${MENTION_PROMPT}' Enter \
                  && sleep 1 \
                  && ${TMUX_BIN} send-keys -t ${TARGET} Enter"; then
                echo "Routed mention to ${AGENT_NAME} via inline (target=${TARGET})"
              else
                echo "Agent ${AGENT_NAME} is offline, skipping"
              fi
            fi
          done

  # ─── CI COMPLETION ROUTING ───
  #
  # When a check_suite completes on a PR authored by one of our registered
  # agents, notify the agent in its tmux session so it can merge (on
  # success) or investigate (on failure) without polling. See #6.
  #
  # Fires once per check_suite.completed event. A repo with multiple CI
  # workflows may produce multiple completed suites per commit (one per
  # app). We accept this minor duplication rather than try to aggregate —
  # the alternative is a timer-based cross-suite coalescer which is
  # substantially more complex and adds latency.
  route-by-ci-completion:
    needs: config
    if: >
      (github.event_name == 'check_suite') &&
      (github.event.action == 'completed')
    runs-on: ubuntu-latest
    env:
      AGENT_SSH_KEY: ${{ secrets.AGENT_SSH_KEY }}
      AGENTS: ${{ needs.config.outputs.agents }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CHECK_SUITE_ID: ${{ github.event.check_suite.id }}
      CHECK_SUITE_HEAD_SHA: ${{ github.event.check_suite.head_sha }}
      CHECK_SUITE_CONCLUSION: ${{ github.event.check_suite.conclusion }}
      REPO: ${{ github.repository }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Route CI completion to agent-authored PRs
        run: |
          set -euo pipefail

          # Only act on terminal conclusions. Skip neutral/cancelled/
          # skipped — rarely need agent action and would add noise.
          case "$CHECK_SUITE_CONCLUSION" in
            success|failure|timed_out|action_required)
              ;;
            *)
              echo "Conclusion '$CHECK_SUITE_CONCLUSION' is not actionable, skipping"
              exit 0
              ;;
          esac

          # Enumerate PRs associated with this check_suite. The
          # check_suite event payload has `pull_requests[]` with basic
          # info but not `draft` / `state`, so we query the PR directly.
          PR_NUMBERS=$(gh api \
            "/repos/${REPO}/commits/${CHECK_SUITE_HEAD_SHA}/pulls" \
            --jq '.[] | .number')

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PR associated with SHA ${CHECK_SUITE_HEAD_SHA}, skipping"
            exit 0
          fi

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$AGENT_SSH_KEY" > ~/.ssh/id_agent
          chmod 600 ~/.ssh/id_agent

          for PR_NUMBER in $PR_NUMBERS; do
            PR_JSON=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}")
            PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
            PR_DRAFT=$(echo "$PR_JSON" | jq -r '.draft')
            PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
            PR_HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')

            # Staleness guard: a force-push during CI produces a
            # workflow_run/check_suite on the OLD head_sha. If that
            # completes after a new one starts, the notification would
            # be misleading — skip it.
            if [ "$PR_HEAD_SHA" != "$CHECK_SUITE_HEAD_SHA" ]; then
              echo "PR #${PR_NUMBER} HEAD moved past ${CHECK_SUITE_HEAD_SHA} (now ${PR_HEAD_SHA}), skipping"
              continue
            fi

            if [ "$PR_STATE" != "open" ]; then
              echo "PR #${PR_NUMBER} state=${PR_STATE}, skipping"
              continue
            fi

            if [ "$PR_DRAFT" = "true" ]; then
              echo "PR #${PR_NUMBER} is a draft, skipping"
              continue
            fi

            # Author-to-agent lookup: PR's author.login must match one
            # of the configured agent app_names (suffix `[bot]`).
            AGENT_NAME=""
            for CANDIDATE in $(echo "$AGENTS" | jq -r 'keys[]'); do
              APP_NAME=$(echo "$AGENTS" | jq -r --arg a "$CANDIDATE" '.[$a].app_name // empty')
              if [ "$PR_AUTHOR" = "${APP_NAME}[bot]" ]; then
                AGENT_NAME="$CANDIDATE"
                break
              fi
            done

            if [ -z "$AGENT_NAME" ]; then
              echo "PR #${PR_NUMBER} author '${PR_AUTHOR}' is not a registered agent, skipping"
              continue
            fi

            # Build the notification prompt.
            PR_URL="https://github.com/${REPO}/pull/${PR_NUMBER}"
            if [ "$CHECK_SUITE_CONCLUSION" = "success" ]; then
              PROMPT="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI SUCCESS. ${PR_URL}. Next: merge if you're the author."
            else
              # On failure, name the first failing check for faster
              # triage. `gh api` returns check_runs for this suite;
              # filter to failed ones.
              FAILING=$(gh api \
                "/repos/${REPO}/check-suites/${CHECK_SUITE_ID}/check-runs" \
                --jq '.check_runs[] | select(.conclusion=="failure" or .conclusion=="timed_out" or .conclusion=="action_required") | .name' \
                | head -1)
              if [ -n "$FAILING" ]; then
                PROMPT="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI FAILED. First failing check: '${FAILING}'. ${PR_URL}. Next: investigate + push fix."
              else
                PROMPT="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI FAILED (${CHECK_SUITE_CONCLUSION}). ${PR_URL}. Next: investigate + push fix."
              fi
            fi

            HOST=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].host')
            SESSION=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].tmux_session')
            WINDOW=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].tmux_window // empty')
            SSH_USER=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].ssh_user')
            TMUX_BIN=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].tmux_bin // "tmux"')
            WORKSPACE_DIR=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].workspace_dir // empty')

            if [ -n "$WINDOW" ]; then
              TARGET="${SESSION}:${WINDOW}"
            else
              TARGET="$SESSION"
            fi

            # Shell-quoting caveat: PR_TITLE is user-controlled (the
            # PR-authoring bot chose it). The helper path uses single-
            # quoted args; a title containing `'` would break remote
            # parse. Strip single quotes defensively before passing.
            SAFE_PROMPT=$(echo "$PROMPT" | tr -d "'")

            HELPER="${WORKSPACE_DIR}/.claude/scripts/tmux-send-to-claude.sh"
            if [ -n "$WORKSPACE_DIR" ] && ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
              "${TMUX_BIN} has-session -t ${SESSION} 2>/dev/null && test -x '${HELPER}'" 2>/dev/null; then
              if ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
                -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
                "'${HELPER}' '${TARGET}' '${SAFE_PROMPT}'"; then
                echo "Routed CI completion for PR #${PR_NUMBER} to ${AGENT_NAME} via helper (target=${TARGET})"
              else
                echo "Agent ${AGENT_NAME} helper invocation failed for PR #${PR_NUMBER}"
              fi
            elif ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/id_agent "${SSH_USER}@${HOST}" \
              "${TMUX_BIN} has-session -t ${SESSION} 2>/dev/null \
                && ${TMUX_BIN} send-keys -t ${TARGET} C-u \
                && ${TMUX_BIN} send-keys -t ${TARGET} '${SAFE_PROMPT}' Enter \
                && sleep 1 \
                && ${TMUX_BIN} send-keys -t ${TARGET} Enter"; then
              echo "Routed CI completion for PR #${PR_NUMBER} to ${AGENT_NAME} via inline (target=${TARGET})"
            else
              echo "Agent ${AGENT_NAME} is offline, skipping CI-completion notification for PR #${PR_NUMBER}"
            fi
          done

  # ─── LABEL CLEANUP ON CLOSE ───
  cleanup-labels:
    if: >
      (github.event_name == 'issues') &&
      (github.event.action == 'closed')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Remove status labels
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          for LABEL in in-progress in-review blocked; do
            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "$LABEL" 2>/dev/null || true
          done
          echo "Cleaned status labels from issue #${ISSUE_NUMBER}"
