name: Agent Router (reusable, v2 — mTLS transport)

# Reusable workflow for routing GitHub events (issues, comments, PRs,
# check_suites) to MACF agents. v2 delivers notifications via mTLS
# HTTPS POST to each agent's /notify endpoint; v1.x used SSH + tmux
# send-keys. See CHANGELOG and macf-actions#8 for the migration.
#
# Caller requirements:
#   secrets:
#     ROUTING_CLIENT_CERT — base64 PEM, minted via `macf certs issue-routing-client`
#     ROUTING_CLIENT_KEY  — base64 PEM, ditto
#     TS_OAUTH_CLIENT_ID  — Tailscale OAuth client ID (runner reaches agent VM over Tailscale)
#     TS_OAUTH_SECRET     — Tailscale OAuth secret
#   vars:
#     PROJECT_CA_CERT     — public PEM of the project CA (from `macf certs init`)
#   caller's agent-config.json:
#     Each agent must have `host` AND `port` fields (port added in v2).

on:
  workflow_call:
    secrets:
      ROUTING_CLIENT_CERT:
        description: Base64 PEM of the routing-action client certificate
        required: true
      ROUTING_CLIENT_KEY:
        description: Base64 PEM of the routing-action client private key
        required: true
      TS_OAUTH_CLIENT_ID:
        description: Tailscale OAuth client ID for the GHA runner
        required: true
      TS_OAUTH_SECRET:
        description: Tailscale OAuth secret for the GHA runner
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: read
  checks: read

jobs:

  # ─── LOAD CONFIG ───
  config:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.load.outputs.agents }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github/agent-config.json
          sparse-checkout-cone-mode: false

      - name: Load config
        id: load
        run: |
          echo "agents=$(jq -c '.agents' .github/agent-config.json)" >> "$GITHUB_OUTPUT"

  # ─── LABEL ROUTING ───
  route-by-label:
    needs: config
    if: >
      (github.event_name == 'issues') &&
      (github.event.action == 'labeled') &&
      (github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    env:
      AGENTS: ${{ needs.config.outputs.agents }}
      PROJECT_CA_CERT: ${{ vars.PROJECT_CA_CERT }}
      ROUTING_CLIENT_CERT: ${{ secrets.ROUTING_CLIENT_CERT }}
      ROUTING_CLIENT_KEY: ${{ secrets.ROUTING_CLIENT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Route to agent by label (mTLS POST)
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_LABEL: ${{ github.event.label.name }}
          ACTOR: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail

          LABEL="$EVENT_LABEL"
          HOST=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].host // empty')
          if [ -z "$HOST" ]; then
            echo "Label '$LABEL' is not an agent label, skipping"
            exit 0
          fi

          APP_NAME=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].app_name // empty')
          if [ "$ACTOR" = "${APP_NAME}[bot]" ]; then
            echo "Actor is the same agent, skipping self-routing"
            exit 0
          fi

          PORT=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].port // empty')
          if [ -z "$PORT" ]; then
            echo "Agent '$LABEL' missing 'port' field in agent-config.json (required in v2)" >&2
            exit 1
          fi

          # NotifyPayload per groundnuty/macf src/types.ts.
          PAYLOAD=$(jq -n \
            --arg type "issue_routed" --arg source "label" \
            --argjson issue_number "$ISSUE_NUMBER" --arg title "$ISSUE_TITLE" \
            '{type: $type, source: $source, issue_number: $issue_number, title: $title}')

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          [ -z "${PROJECT_CA_CERT:-}" ] && { echo "PROJECT_CA_CERT var unset" >&2; exit 1; }
          printf '%s' "$PROJECT_CA_CERT" > "$TMPDIR/ca.pem"
          echo "$ROUTING_CLIENT_CERT" | base64 -d > "$TMPDIR/c.pem"
          echo "$ROUTING_CLIENT_KEY"  | base64 -d > "$TMPDIR/k.pem"
          chmod 600 "$TMPDIR/k.pem"

          set +e
          HTTP_CODE=$(curl --silent --show-error \
            --cacert "$TMPDIR/ca.pem" --cert "$TMPDIR/c.pem" --key "$TMPDIR/k.pem" \
            --max-time 30 -X POST "https://${HOST}:${PORT}/notify" \
            -H 'Content-Type: application/json' -d "$PAYLOAD" \
            -o "$TMPDIR/r.txt" -w '%{http_code}')
          CURL_RC=$?
          set -e

          if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
            echo "Routed issue #${ISSUE_NUMBER} to ${LABEL} via mTLS POST (HTTP 200)"
            exit 0
          fi

          echo "Agent ${LABEL} unreachable via mTLS (curl rc=$CURL_RC, HTTP=$HTTP_CODE); marking agent-offline"
          if [ -s "$TMPDIR/r.txt" ]; then echo "--- response ---" >&2; cat "$TMPDIR/r.txt" >&2; fi
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "agent-offline"
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Agent \`${APP_NAME}[bot]\` is offline. Issue will be picked up when the agent starts."
          exit 1

  # ─── @MENTION ROUTING ───
  route-by-mention:
    needs: config
    if: >
      (github.event_name == 'issue_comment') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review')
    runs-on: ubuntu-latest
    env:
      AGENTS: ${{ needs.config.outputs.agents }}
      PROJECT_CA_CERT: ${{ vars.PROJECT_CA_CERT }}
      ROUTING_CLIENT_CERT: ${{ secrets.ROUTING_CLIENT_CERT }}
      ROUTING_CLIENT_KEY: ${{ secrets.ROUTING_CLIENT_KEY }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Route to mentioned agents (mTLS POST)
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            issue_comment) BODY="$COMMENT_BODY"; ACTOR="$COMMENT_USER"; REF="issue #${ISSUE_NUMBER}"; VIEW_NUM="$ISSUE_NUMBER" ;;
            pull_request) BODY="$PR_BODY"; ACTOR="$PR_USER"; REF="PR #${PR_NUMBER}"; VIEW_NUM="$PR_NUMBER" ;;
            pull_request_review) BODY="$REVIEW_BODY"; ACTOR="$REVIEW_USER"; REF="PR #${PR_NUMBER}"; VIEW_NUM="$PR_NUMBER" ;;
            *) BODY="$COMMENT_BODY"; ACTOR="$COMMENT_USER"; REF="PR #${PR_NUMBER}"; VIEW_NUM="$PR_NUMBER" ;;
          esac

          [ "$ACTOR" = "github-actions[bot]" ] && { echo "skip github-actions[bot]"; exit 0; }

          TMPDIR=$(mktemp -d); trap 'rm -rf "$TMPDIR"' EXIT
          [ -z "${PROJECT_CA_CERT:-}" ] && { echo "PROJECT_CA_CERT unset" >&2; exit 1; }
          printf '%s' "$PROJECT_CA_CERT" > "$TMPDIR/ca.pem"
          echo "$ROUTING_CLIENT_CERT" | base64 -d > "$TMPDIR/c.pem"
          echo "$ROUTING_CLIENT_KEY"  | base64 -d > "$TMPDIR/k.pem"
          chmod 600 "$TMPDIR/k.pem"

          for AGENT_NAME in $(echo "$AGENTS" | jq -r 'keys[]'); do
            APP_NAME=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].app_name // empty')
            [ "$ACTOR" = "${APP_NAME}[bot]" ] && continue

            # Fixed-string match instead of regex: $BODY is user-controlled
            # (issue comment, PR body, review body). Regex interpretation
            # risked catastrophic backtracking on crafted input (ReDoS) —
            # filed as groundnuty/macf-actions#13. Semantically we want a
            # literal substring check for "@<name>[bot]", which is exactly
            # what `grep -F` does. Two `-e` terms cover the alternation.
            if echo "$BODY" | grep -qF -e "@${AGENT_NAME}[bot]" -e "@${APP_NAME}[bot]"; then
              HOST=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].host // empty')
              PORT=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].port // empty')
              if [ -z "$HOST" ] || [ -z "$PORT" ]; then
                echo "Agent ${AGENT_NAME} missing host/port; skipping" >&2
                continue
              fi

              MESSAGE="You were mentioned in ${REF}. Please check and respond: gh issue view ${VIEW_NUM} --repo ${REPO} --json title,body,comments"
              PAYLOAD=$(jq -n --arg type "mention" --arg source "mention" --argjson issue_number "$VIEW_NUM" --arg message "$MESSAGE" \
                '{type: $type, source: $source, issue_number: $issue_number, message: $message}')

              set +e
              HTTP_CODE=$(curl --silent --show-error \
                --cacert "$TMPDIR/ca.pem" --cert "$TMPDIR/c.pem" --key "$TMPDIR/k.pem" \
                --max-time 30 -X POST "https://${HOST}:${PORT}/notify" \
                -H 'Content-Type: application/json' -d "$PAYLOAD" \
                -o "$TMPDIR/r.txt" -w '%{http_code}')
              CURL_RC=$?
              set -e

              if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
                echo "Routed mention to ${AGENT_NAME} via mTLS POST"
              else
                echo "Agent ${AGENT_NAME} unreachable via mTLS (rc=$CURL_RC HTTP=$HTTP_CODE); skipping (mention events don't mark agent-offline)"
              fi
            fi
          done

  # ─── CI COMPLETION ROUTING ───
  route-by-ci-completion:
    needs: config
    if: >
      (github.event_name == 'check_suite') &&
      (github.event.action == 'completed')
    runs-on: ubuntu-latest
    env:
      AGENTS: ${{ needs.config.outputs.agents }}
      PROJECT_CA_CERT: ${{ vars.PROJECT_CA_CERT }}
      ROUTING_CLIENT_CERT: ${{ secrets.ROUTING_CLIENT_CERT }}
      ROUTING_CLIENT_KEY: ${{ secrets.ROUTING_CLIENT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CHECK_SUITE_ID: ${{ github.event.check_suite.id }}
      CHECK_SUITE_HEAD_SHA: ${{ github.event.check_suite.head_sha }}
      CHECK_SUITE_CONCLUSION: ${{ github.event.check_suite.conclusion }}
      REPO: ${{ github.repository }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Route CI completion to agent-authored PRs (mTLS POST)
        run: |
          set -euo pipefail

          case "$CHECK_SUITE_CONCLUSION" in
            success|failure|timed_out|action_required) ;;
            *) echo "Conclusion '$CHECK_SUITE_CONCLUSION' not actionable; skipping"; exit 0 ;;
          esac

          PR_NUMBERS=$(gh api "/repos/${REPO}/commits/${CHECK_SUITE_HEAD_SHA}/pulls" --jq '.[] | .number')
          [ -z "$PR_NUMBERS" ] && { echo "No PR for SHA ${CHECK_SUITE_HEAD_SHA}; skipping"; exit 0; }

          TMPDIR=$(mktemp -d); trap 'rm -rf "$TMPDIR"' EXIT
          [ -z "${PROJECT_CA_CERT:-}" ] && { echo "PROJECT_CA_CERT unset" >&2; exit 1; }
          printf '%s' "$PROJECT_CA_CERT" > "$TMPDIR/ca.pem"
          echo "$ROUTING_CLIENT_CERT" | base64 -d > "$TMPDIR/c.pem"
          echo "$ROUTING_CLIENT_KEY"  | base64 -d > "$TMPDIR/k.pem"
          chmod 600 "$TMPDIR/k.pem"

          for PR_NUMBER in $PR_NUMBERS; do
            PR_JSON=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}")
            PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
            PR_DRAFT=$(echo "$PR_JSON" | jq -r '.draft')
            PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
            PR_HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')

            # Staleness guard: a force-push during CI produces a check_suite
            # on the OLD head_sha. If it completes after new CI started, the
            # notification would reference outdated status. See #6 body for
            # the force-push race-condition write-up.
            [ "$PR_HEAD_SHA" != "$CHECK_SUITE_HEAD_SHA" ] && { echo "PR #${PR_NUMBER} HEAD moved past ${CHECK_SUITE_HEAD_SHA} (now ${PR_HEAD_SHA}); skipping stale check_suite"; continue; }
            [ "$PR_STATE" != "open" ] && { echo "PR #${PR_NUMBER} state=${PR_STATE}; skipping"; continue; }
            [ "$PR_DRAFT" = "true" ] && { echo "PR #${PR_NUMBER} is a draft; skipping"; continue; }

            AGENT_NAME=""
            for CANDIDATE in $(echo "$AGENTS" | jq -r 'keys[]'); do
              APP_NAME=$(echo "$AGENTS" | jq -r --arg a "$CANDIDATE" '.[$a].app_name // empty')
              [ "$PR_AUTHOR" = "${APP_NAME}[bot]" ] && { AGENT_NAME="$CANDIDATE"; break; }
            done
            [ -z "$AGENT_NAME" ] && { echo "PR #${PR_NUMBER} author '${PR_AUTHOR}' not a registered agent; skipping"; continue; }

            HOST=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].host // empty')
            PORT=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].port // empty')
            if [ -z "$HOST" ] || [ -z "$PORT" ]; then
              echo "Agent ${AGENT_NAME} missing host/port in agent-config.json; skipping" >&2
              continue
            fi

            PR_URL="https://github.com/${REPO}/pull/${PR_NUMBER}"
            if [ "$CHECK_SUITE_CONCLUSION" = "success" ]; then
              MESSAGE="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI SUCCESS. ${PR_URL}. Next: merge if you're the author."
            else
              FAILING=$(gh api "/repos/${REPO}/check-suites/${CHECK_SUITE_ID}/check-runs" \
                --jq '.check_runs[] | select(.conclusion=="failure" or .conclusion=="timed_out" or .conclusion=="action_required") | .name' | head -1)
              if [ -n "$FAILING" ]; then
                MESSAGE="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI FAILED. First failing check: '${FAILING}'. ${PR_URL}. Next: investigate + push fix."
              else
                MESSAGE="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI FAILED (${CHECK_SUITE_CONCLUSION}). ${PR_URL}. Next: investigate + push fix."
              fi
            fi

            # CI-completion payload shape matches CiCompletionPayloadSchema
            # in groundnuty/macf src/types.ts (landed in macf#122 / 4e2be5b).
            # failing_check_name is null on success, string on failure paths.
            # The empty-string → null conversion is needed because `jq --arg`
            # always produces a string; empty-string is how we indicate "no
            # failing check" across the bash → jq boundary.
            PAYLOAD=$(jq -n \
              --arg type "ci_completion" --arg source "ci_completion" \
              --argjson pr_number "$PR_NUMBER" --arg pr_title "$PR_TITLE" \
              --arg pr_url "$PR_URL" --arg conclusion "$CHECK_SUITE_CONCLUSION" \
              --arg failing_check_name "${FAILING:-}" --arg message "$MESSAGE" \
              '{
                type: $type,
                source: $source,
                pr_number: $pr_number,
                pr_title: $pr_title,
                pr_url: $pr_url,
                conclusion: $conclusion,
                failing_check_name: (if $failing_check_name == "" then null else $failing_check_name end),
                message: $message
              }')

            set +e
            HTTP_CODE=$(curl --silent --show-error \
              --cacert "$TMPDIR/ca.pem" --cert "$TMPDIR/c.pem" --key "$TMPDIR/k.pem" \
              --max-time 30 -X POST "https://${HOST}:${PORT}/notify" \
              -H 'Content-Type: application/json' -d "$PAYLOAD" \
              -o "$TMPDIR/r.txt" -w '%{http_code}')
            CURL_RC=$?
            set -e

            if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
              echo "Routed CI completion for PR #${PR_NUMBER} to ${AGENT_NAME} via mTLS"
            else
              echo "Agent ${AGENT_NAME} unreachable via mTLS for PR #${PR_NUMBER} (rc=$CURL_RC HTTP=$HTTP_CODE); not marking agent-offline on CI-completion path"
            fi
          done

  # ─── LABEL CLEANUP ON CLOSE ───
  cleanup-labels:
    if: >
      (github.event_name == 'issues') &&
      (github.event.action == 'closed')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Remove status labels
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          for LABEL in in-progress in-review blocked; do
            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "$LABEL" 2>/dev/null || true
          done
          echo "Cleaned status labels from issue #${ISSUE_NUMBER}"
