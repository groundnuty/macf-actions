name: Agent Router (reusable, v3 — registry-driven mTLS transport)

# Reusable workflow for routing GitHub events (issues, comments, PRs,
# check_suites) to MACF agents. v3 resolves each agent's host + port
# from the MACF registry (GitHub Variables per DR-005/DR-006/DR-007)
# instead of reading them from the caller's agent-config.json. This
# closes the v2.0.1 DR-007 violation (see macf-actions#18) and restores
# the dynamic-port-assignment property that lets multiple agents share
# a VM without operator-managed port coordination.
#
# v3 is a breaking change vs v2.0.1. See CHANGELOG §3.0.0 for the
# consumer migration steps (new secrets, new inputs, agent-config.json
# schema slim-down).
#
# Caller requirements:
#   inputs:
#     project               — project name used to derive registry variable
#                             names (e.g. `academic-resume` →
#                             `ACADEMIC_RESUME_AGENT_<NAME>` and
#                             `ACADEMIC_RESUME_CA_CERT`). Required.
#     registry-api-path     — API path prefix for the registry scope
#                             (omit trailing /actions/variables). Covers
#                             all three DR-006 scopes: org, profile, repo.
#                             Optional; defaults to `/orgs/<caller-owner>`.
#   secrets:
#     ROUTING_CLIENT_CERT   — base64 PEM, minted via `macf certs issue-routing-client`
#     ROUTING_CLIENT_KEY    — base64 PEM, ditto
#     TS_OAUTH_CLIENT_ID    — Tailscale OAuth client ID (runner → agent VM)
#     TS_OAUTH_SECRET       — Tailscale OAuth secret
#     MACF_ROUTING_APP_ID   — GitHub App ID for a variables:read-only App
#                             installed on the registry org (see §3.0.0
#                             migration for dedicated-App rationale).
#     MACF_ROUTING_APP_KEY  — PEM private key for the above App.
#   vars (on the caller repo, org, or enclosing scope):
#     <PROJECT_SEG>_CA_CERT — public PEM of the project CA. Name is derived
#                             from `inputs.project` via toVariableSegment
#                             (uppercase + hyphen→underscore). Set by
#                             `macf certs init` at Phase 3 of the deployment.
#   caller's agent-config.json:
#     Each agent entry needs `app_name` (used for actor-comparison skip).
#     Legacy fields carried over from v1.x / v2.x consumers (`host`,
#     `port`, `tmux_session`, `tmux_bin`, `ssh_user`, `ssh_key_secret`)
#     may remain in the file but are unread under v3 — the registry is
#     the single source of truth for addressing.

on:
  workflow_call:
    inputs:
      project:
        description: >-
          Project name used to derive registry variable names. Must match
          the `project` field in the agent's `.macf/macf-agent.json`.
        type: string
        required: true
      registry-api-path:
        description: >-
          GitHub REST API path prefix for the MACF registry, without trailing
          `/actions/variables`. Examples per DR-006: `/orgs/<org>` for org
          scope, `/repos/<user>/<user>` for profile scope, `/repos/<o>/<r>`
          for repo scope.
        type: string
        required: false
        default: /orgs/${{ github.repository_owner }}
    secrets:
      ROUTING_CLIENT_CERT:
        description: Base64 PEM of the routing-action client certificate
        required: true
      ROUTING_CLIENT_KEY:
        description: Base64 PEM of the routing-action client private key
        required: true
      TS_OAUTH_CLIENT_ID:
        description: Tailscale OAuth client ID for the GHA runner
        required: true
      TS_OAUTH_SECRET:
        description: Tailscale OAuth secret for the GHA runner
        required: true
      MACF_ROUTING_APP_ID:
        description: >-
          GitHub App ID for the variables:read-only App that mints registry
          access tokens. Dedicated App keeps blast radius small.
        required: true
      MACF_ROUTING_APP_KEY:
        description: PEM private key for the MACF_ROUTING App
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: read
  checks: read

jobs:

  # ─── LOAD CONFIG ───
  config:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.load.outputs.agents }}
      project-seg: ${{ steps.compute.outputs.project-seg }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github/agent-config.json
          sparse-checkout-cone-mode: false

      - name: Load config
        id: load
        run: |
          echo "agents=$(jq -c '.agents' .github/agent-config.json)" >> "$GITHUB_OUTPUT"

      - name: Compute toVariableSegment(project) for downstream vars lookup
        id: compute
        env:
          RAW_PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail
          : "${RAW_PROJECT:?project input must not be empty}"
          seg=$(printf '%s' "$RAW_PROJECT" | tr '[:lower:]-' '[:upper:]_')
          echo "project-seg=${seg}" >> "$GITHUB_OUTPUT"

  # ─── LABEL ROUTING ───
  route-by-label:
    needs: config
    if: >
      (github.event_name == 'issues') &&
      (github.event.action == 'labeled') &&
      (github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    env:
      AGENTS: ${{ needs.config.outputs.agents }}
      PROJECT_CA_CERT: ${{ vars[format('{0}_CA_CERT', needs.config.outputs.project-seg)] }}
      ROUTING_CLIENT_CERT: ${{ secrets.ROUTING_CLIENT_CERT }}
      ROUTING_CLIENT_KEY: ${{ secrets.ROUTING_CLIENT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # Resolve the reusable workflow's OWN ref (tag / branch / SHA) for
      # the cross-repo checkout below. `github.workflow_ref` is the full
      # ref including repo+path+@ref, e.g.
      #   groundnuty/macf-actions/.github/workflows/agent-router.yml@refs/tags/v3.0.3
      # `github.workflow_sha`, despite the name, is the CALLER workflow's
      # SHA in a reusable-workflow context (documented quirk; see
      # github.com/orgs/community/discussions/31054). That's the exact
      # class of bug v3.0.2 hit — #25. Parsing workflow_ref gives us the
      # right ref for all three pin forms (tag / branch / raw SHA).
      - name: Resolve reusable workflow ref
        id: reusable_ref
        env:
          GH_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          ref="${GH_WORKFLOW_REF##*@}"
          ref="${ref#refs/tags/}"
          ref="${ref#refs/heads/}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      # Check out groundnuty/macf-actions at the reusable's own ref so
      # the composite action is present at its canonical path regardless
      # of the caller. `uses: ./.github/actions/resolve-agent-endpoint`
      # below resolves against this checked-out copy.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: groundnuty/macf-actions
          ref: ${{ steps.reusable_ref.outputs.ref }}
          sparse-checkout: .github/actions/resolve-agent-endpoint
          sparse-checkout-cone-mode: false

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Label gate (skip non-agent labels + self-routing)
        id: gate
        env:
          EVENT_LABEL: ${{ github.event.label.name }}
          ACTOR: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail
          LABEL="$EVENT_LABEL"
          APP_NAME=$(echo "$AGENTS" | jq -r --arg l "$LABEL" '.[$l].app_name // empty')
          if [ -z "$APP_NAME" ]; then
            echo "Label '$LABEL' is not an agent label, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$ACTOR" = "${APP_NAME}[bot]" ]; then
            echo "Actor is the same agent, skipping self-routing"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "agent-name=$LABEL" >> "$GITHUB_OUTPUT"
          echo "app-name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Mint registry-read token
        id: registry-token
        if: steps.gate.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MACF_ROUTING_APP_ID }}
          private-key: ${{ secrets.MACF_ROUTING_APP_KEY }}
          owner: ${{ github.repository_owner }}
          # No permission-* subsetting: `macf-routing` is already a
          # minimum-scope App (metadata:read + actions_variables:read).
          # An earlier v3.0.0 iteration specified `permission-variables:
          # read` but that input isn't recognized by
          # actions/create-github-app-token@v3 — GitHub's API received
          # it as a subset-request and 422'd with "permissions not
          # granted to this installation". See groundnuty/macf-actions#20.

      - name: Resolve agent endpoint from registry
        id: endpoint
        if: steps.gate.outputs.skip != 'true'
        # Local path matches the checkout above. Step-level `uses:` refs
        # can't evaluate ${{ github.* }} contexts, so the workaround is
        # to check out macf-actions at the reusable's own ref in an
        # earlier step and `uses: ./...` against the local copy. See
        # macf-actions#22 (original checkout) + #25 (workflow_ref fix).
        uses: ./.github/actions/resolve-agent-endpoint
        with:
          project: ${{ inputs.project }}
          agent-name: ${{ steps.gate.outputs.agent-name }}
          registry-api-path: ${{ inputs.registry-api-path }}
          registry-token: ${{ steps.registry-token.outputs.token }}

      - name: Route to agent by label (mTLS POST)
        if: steps.gate.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          LABEL: ${{ steps.gate.outputs.agent-name }}
          APP_NAME: ${{ steps.gate.outputs.app-name }}
          HOST: ${{ steps.endpoint.outputs.host }}
          PORT: ${{ steps.endpoint.outputs.port }}
        run: |
          set -euo pipefail

          PAYLOAD=$(jq -n \
            --arg type "issue_routed" --arg source "label" \
            --argjson issue_number "$ISSUE_NUMBER" --arg title "$ISSUE_TITLE" \
            '{type: $type, source: $source, issue_number: $issue_number, title: $title}')

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          [ -z "${PROJECT_CA_CERT:-}" ] && { echo "CA-cert var empty — check <PROJECT>_CA_CERT is set" >&2; exit 1; }
          printf '%s' "$PROJECT_CA_CERT" > "$TMPDIR/ca.pem"
          echo "$ROUTING_CLIENT_CERT" | base64 -d > "$TMPDIR/c.pem"
          echo "$ROUTING_CLIENT_KEY"  | base64 -d > "$TMPDIR/k.pem"
          chmod 600 "$TMPDIR/k.pem"

          set +e
          HTTP_CODE=$(curl --silent --show-error \
            --cacert "$TMPDIR/ca.pem" --cert "$TMPDIR/c.pem" --key "$TMPDIR/k.pem" \
            --max-time 30 -X POST "https://${HOST}:${PORT}/notify" \
            -H 'Content-Type: application/json' -d "$PAYLOAD" \
            -o "$TMPDIR/r.txt" -w '%{http_code}')
          CURL_RC=$?
          set -e

          if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
            echo "Routed issue #${ISSUE_NUMBER} to ${LABEL} via mTLS POST (HTTP 200)"
            exit 0
          fi

          echo "Agent ${LABEL} unreachable via mTLS (curl rc=$CURL_RC, HTTP=$HTTP_CODE); marking agent-offline"
          if [ -s "$TMPDIR/r.txt" ]; then echo "--- response ---" >&2; cat "$TMPDIR/r.txt" >&2; fi
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "agent-offline"
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Agent \`${APP_NAME}[bot]\` is offline. Issue will be picked up when the agent starts."
          exit 1

      - name: Handle registry-miss as agent-offline
        if: steps.gate.outputs.skip != 'true' && failure() && steps.endpoint.outcome == 'failure'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          APP_NAME: ${{ steps.gate.outputs.app-name }}
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "agent-offline"
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "Agent \`${APP_NAME}[bot]\` is not registered (registry miss). Issue will be picked up when the agent starts and registers."

  # ─── @MENTION ROUTING ───
  route-by-mention:
    needs: config
    if: >
      (github.event_name == 'issue_comment') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review')
    runs-on: ubuntu-latest
    env:
      AGENTS: ${{ needs.config.outputs.agents }}
      PROJECT_CA_CERT: ${{ vars[format('{0}_CA_CERT', needs.config.outputs.project-seg)] }}
      ROUTING_CLIENT_CERT: ${{ secrets.ROUTING_CLIENT_CERT }}
      ROUTING_CLIENT_KEY: ${{ secrets.ROUTING_CLIENT_KEY }}
      PROJECT_SEG: ${{ needs.config.outputs.project-seg }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Mint registry-read token
        id: registry-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MACF_ROUTING_APP_ID }}
          private-key: ${{ secrets.MACF_ROUTING_APP_KEY }}
          owner: ${{ github.repository_owner }}
          # No permission-* subsetting: `macf-routing` is already a
          # minimum-scope App (metadata:read + actions_variables:read).
          # An earlier v3.0.0 iteration specified `permission-variables:
          # read` but that input isn't recognized by
          # actions/create-github-app-token@v3 — GitHub's API received
          # it as a subset-request and 422'd with "permissions not
          # granted to this installation". See groundnuty/macf-actions#20.

      - name: Route to mentioned agents (mTLS POST)
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REG_TOKEN: ${{ steps.registry-token.outputs.token }}
          REG_PATH: ${{ inputs.registry-api-path }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            issue_comment) BODY="$COMMENT_BODY"; ACTOR="$COMMENT_USER"; REF="issue #${ISSUE_NUMBER}"; VIEW_NUM="$ISSUE_NUMBER" ;;
            pull_request) BODY="$PR_BODY"; ACTOR="$PR_USER"; REF="PR #${PR_NUMBER}"; VIEW_NUM="$PR_NUMBER" ;;
            pull_request_review) BODY="$REVIEW_BODY"; ACTOR="$REVIEW_USER"; REF="PR #${PR_NUMBER}"; VIEW_NUM="$PR_NUMBER" ;;
            *) BODY="$COMMENT_BODY"; ACTOR="$COMMENT_USER"; REF="PR #${PR_NUMBER}"; VIEW_NUM="$PR_NUMBER" ;;
          esac

          [ "$ACTOR" = "github-actions[bot]" ] && { echo "skip github-actions[bot]"; exit 0; }

          TMPDIR=$(mktemp -d); trap 'rm -rf "$TMPDIR"' EXIT
          [ -z "${PROJECT_CA_CERT:-}" ] && { echo "CA-cert var empty — check <PROJECT>_CA_CERT is set" >&2; exit 1; }
          printf '%s' "$PROJECT_CA_CERT" > "$TMPDIR/ca.pem"
          echo "$ROUTING_CLIENT_CERT" | base64 -d > "$TMPDIR/c.pem"
          echo "$ROUTING_CLIENT_KEY"  | base64 -d > "$TMPDIR/k.pem"
          chmod 600 "$TMPDIR/k.pem"

          for AGENT_NAME in $(echo "$AGENTS" | jq -r 'keys[]'); do
            APP_NAME=$(echo "$AGENTS" | jq -r --arg a "$AGENT_NAME" '.[$a].app_name // empty')
            [ "$ACTOR" = "${APP_NAME}[bot]" ] && continue

            # Fixed-string match instead of regex: $BODY is user-controlled
            # (issue comment, PR body, review body). Regex interpretation
            # risked catastrophic backtracking on crafted input (ReDoS) —
            # filed as groundnuty/macf-actions#13. Semantically we want a
            # literal substring check for "@<name>[bot]", which is exactly
            # what `grep -F` does. Two `-e` terms cover the alternation.
            if echo "$BODY" | grep -qF -e "@${AGENT_NAME}[bot]" -e "@${APP_NAME}[bot]"; then
              # Inline registry lookup: loop-driven, so `uses: composite`
              # isn't an option here (steps are static). Transform identical
              # to .github/actions/resolve-agent-endpoint and covered by
              # test/resolve-agent-endpoint-transform.sh.
              AGENT_SEG=$(printf '%s' "$AGENT_NAME" | tr '[:lower:]-' '[:upper:]_')
              VAR_NAME="${PROJECT_SEG}_AGENT_${AGENT_SEG}"

              set +e
              ENTRY=$(GH_TOKEN="$REG_TOKEN" gh api "${REG_PATH}/actions/variables/${VAR_NAME}" --jq '.value' 2>/dev/null)
              API_RC=$?
              set -e
              if [ "$API_RC" -ne 0 ] || [ -z "$ENTRY" ]; then
                echo "Registry miss for ${AGENT_NAME} (${VAR_NAME}); skipping mention route"
                continue
              fi
              HOST=$(echo "$ENTRY" | jq -r '.host // empty')
              PORT=$(echo "$ENTRY" | jq -r '.port // empty')
              if [ -z "$HOST" ] || [ -z "$PORT" ]; then
                echo "Registry entry ${VAR_NAME} missing host or port; skipping" >&2
                continue
              fi

              MESSAGE="You were mentioned in ${REF}. Please check and respond: gh issue view ${VIEW_NUM} --repo ${REPO} --json title,body,comments"
              PAYLOAD=$(jq -n --arg type "mention" --arg source "mention" --argjson issue_number "$VIEW_NUM" --arg message "$MESSAGE" \
                '{type: $type, source: $source, issue_number: $issue_number, message: $message}')

              set +e
              HTTP_CODE=$(curl --silent --show-error \
                --cacert "$TMPDIR/ca.pem" --cert "$TMPDIR/c.pem" --key "$TMPDIR/k.pem" \
                --max-time 30 -X POST "https://${HOST}:${PORT}/notify" \
                -H 'Content-Type: application/json' -d "$PAYLOAD" \
                -o "$TMPDIR/r.txt" -w '%{http_code}')
              CURL_RC=$?
              set -e

              if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
                echo "Routed mention to ${AGENT_NAME} via mTLS POST"
              else
                echo "Agent ${AGENT_NAME} unreachable via mTLS (rc=$CURL_RC HTTP=$HTTP_CODE); skipping (mention events don't mark agent-offline)"
              fi
            fi
          done

  # ─── CI COMPLETION ROUTING ───
  route-by-ci-completion:
    needs: config
    if: >
      (github.event_name == 'check_suite') &&
      (github.event.action == 'completed')
    runs-on: ubuntu-latest
    env:
      AGENTS: ${{ needs.config.outputs.agents }}
      PROJECT_CA_CERT: ${{ vars[format('{0}_CA_CERT', needs.config.outputs.project-seg)] }}
      ROUTING_CLIENT_CERT: ${{ secrets.ROUTING_CLIENT_CERT }}
      ROUTING_CLIENT_KEY: ${{ secrets.ROUTING_CLIENT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CHECK_SUITE_ID: ${{ github.event.check_suite.id }}
      CHECK_SUITE_HEAD_SHA: ${{ github.event.check_suite.head_sha }}
      CHECK_SUITE_CONCLUSION: ${{ github.event.check_suite.conclusion }}
      REPO: ${{ github.repository }}
      PROJECT_SEG: ${{ needs.config.outputs.project-seg }}
    steps:
      # No composite-action checkout here — route-by-ci-completion
      # uses the inline registry lookup (loop-driven, can't use the
      # composite). Previously had a sparse-checkout as defensive
      # leftover; removed in v3.0.2. See groundnuty/macf-actions#22.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-runner

      - name: Wait for Tailscale network
        run: sleep 10

      - name: Mint registry-read token
        id: registry-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MACF_ROUTING_APP_ID }}
          private-key: ${{ secrets.MACF_ROUTING_APP_KEY }}
          owner: ${{ github.repository_owner }}
          # No permission-* subsetting: `macf-routing` is already a
          # minimum-scope App (metadata:read + actions_variables:read).
          # An earlier v3.0.0 iteration specified `permission-variables:
          # read` but that input isn't recognized by
          # actions/create-github-app-token@v3 — GitHub's API received
          # it as a subset-request and 422'd with "permissions not
          # granted to this installation". See groundnuty/macf-actions#20.

      - name: Route CI completion to agent-authored PRs (mTLS POST)
        env:
          REG_TOKEN: ${{ steps.registry-token.outputs.token }}
          REG_PATH: ${{ inputs.registry-api-path }}
        run: |
          set -euo pipefail

          case "$CHECK_SUITE_CONCLUSION" in
            success|failure|timed_out|action_required) ;;
            *) echo "Conclusion '$CHECK_SUITE_CONCLUSION' not actionable; skipping"; exit 0 ;;
          esac

          PR_NUMBERS=$(gh api "/repos/${REPO}/commits/${CHECK_SUITE_HEAD_SHA}/pulls" --jq '.[] | .number')
          [ -z "$PR_NUMBERS" ] && { echo "No PR for SHA ${CHECK_SUITE_HEAD_SHA}; skipping"; exit 0; }

          TMPDIR=$(mktemp -d); trap 'rm -rf "$TMPDIR"' EXIT
          [ -z "${PROJECT_CA_CERT:-}" ] && { echo "CA-cert var empty — check <PROJECT>_CA_CERT is set" >&2; exit 1; }
          printf '%s' "$PROJECT_CA_CERT" > "$TMPDIR/ca.pem"
          echo "$ROUTING_CLIENT_CERT" | base64 -d > "$TMPDIR/c.pem"
          echo "$ROUTING_CLIENT_KEY"  | base64 -d > "$TMPDIR/k.pem"
          chmod 600 "$TMPDIR/k.pem"

          for PR_NUMBER in $PR_NUMBERS; do
            PR_JSON=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}")
            PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
            PR_DRAFT=$(echo "$PR_JSON" | jq -r '.draft')
            PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
            PR_HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')

            # Staleness guard: a force-push during CI produces a check_suite
            # on the OLD head_sha. If it completes after new CI started, the
            # notification would reference outdated status. See #6 body for
            # the force-push race-condition write-up.
            [ "$PR_HEAD_SHA" != "$CHECK_SUITE_HEAD_SHA" ] && { echo "PR #${PR_NUMBER} HEAD moved past ${CHECK_SUITE_HEAD_SHA} (now ${PR_HEAD_SHA}); skipping stale check_suite"; continue; }
            [ "$PR_STATE" != "open" ] && { echo "PR #${PR_NUMBER} state=${PR_STATE}; skipping"; continue; }
            [ "$PR_DRAFT" = "true" ] && { echo "PR #${PR_NUMBER} is a draft; skipping"; continue; }

            AGENT_NAME=""
            for CANDIDATE in $(echo "$AGENTS" | jq -r 'keys[]'); do
              APP_NAME=$(echo "$AGENTS" | jq -r --arg a "$CANDIDATE" '.[$a].app_name // empty')
              [ "$PR_AUTHOR" = "${APP_NAME}[bot]" ] && { AGENT_NAME="$CANDIDATE"; break; }
            done
            [ -z "$AGENT_NAME" ] && { echo "PR #${PR_NUMBER} author '${PR_AUTHOR}' not a registered agent; skipping"; continue; }

            # Same inline-lookup justification as route-by-mention: loop-driven.
            AGENT_SEG=$(printf '%s' "$AGENT_NAME" | tr '[:lower:]-' '[:upper:]_')
            VAR_NAME="${PROJECT_SEG}_AGENT_${AGENT_SEG}"
            set +e
            ENTRY=$(GH_TOKEN="$REG_TOKEN" gh api "${REG_PATH}/actions/variables/${VAR_NAME}" --jq '.value' 2>/dev/null)
            API_RC=$?
            set -e
            if [ "$API_RC" -ne 0 ] || [ -z "$ENTRY" ]; then
              echo "Registry miss for ${AGENT_NAME} (${VAR_NAME}); skipping CI-completion route"
              continue
            fi
            HOST=$(echo "$ENTRY" | jq -r '.host // empty')
            PORT=$(echo "$ENTRY" | jq -r '.port // empty')
            if [ -z "$HOST" ] || [ -z "$PORT" ]; then
              echo "Registry entry ${VAR_NAME} missing host or port; skipping" >&2
              continue
            fi

            PR_URL="https://github.com/${REPO}/pull/${PR_NUMBER}"
            if [ "$CHECK_SUITE_CONCLUSION" = "success" ]; then
              MESSAGE="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI SUCCESS. ${PR_URL}. Next: merge if you're the author."
            else
              FAILING=$(gh api "/repos/${REPO}/check-suites/${CHECK_SUITE_ID}/check-runs" \
                --jq '.check_runs[] | select(.conclusion=="failure" or .conclusion=="timed_out" or .conclusion=="action_required") | .name' | head -1)
              if [ -n "$FAILING" ]; then
                MESSAGE="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI FAILED. First failing check: '${FAILING}'. ${PR_URL}. Next: investigate + push fix."
              else
                MESSAGE="PR #${PR_NUMBER} (\"${PR_TITLE}\"): CI FAILED (${CHECK_SUITE_CONCLUSION}). ${PR_URL}. Next: investigate + push fix."
              fi
            fi

            # CI-completion payload shape matches CiCompletionPayloadSchema
            # in groundnuty/macf src/types.ts (landed in macf#122 / 4e2be5b).
            # failing_check_name is null on success, string on failure paths.
            # The empty-string → null conversion is needed because `jq --arg`
            # always produces a string; empty-string is how we indicate "no
            # failing check" across the bash → jq boundary.
            PAYLOAD=$(jq -n \
              --arg type "ci_completion" --arg source "ci_completion" \
              --argjson pr_number "$PR_NUMBER" --arg pr_title "$PR_TITLE" \
              --arg pr_url "$PR_URL" --arg conclusion "$CHECK_SUITE_CONCLUSION" \
              --arg failing_check_name "${FAILING:-}" --arg message "$MESSAGE" \
              '{
                type: $type,
                source: $source,
                pr_number: $pr_number,
                pr_title: $pr_title,
                pr_url: $pr_url,
                conclusion: $conclusion,
                failing_check_name: (if $failing_check_name == "" then null else $failing_check_name end),
                message: $message
              }')

            set +e
            HTTP_CODE=$(curl --silent --show-error \
              --cacert "$TMPDIR/ca.pem" --cert "$TMPDIR/c.pem" --key "$TMPDIR/k.pem" \
              --max-time 30 -X POST "https://${HOST}:${PORT}/notify" \
              -H 'Content-Type: application/json' -d "$PAYLOAD" \
              -o "$TMPDIR/r.txt" -w '%{http_code}')
            CURL_RC=$?
            set -e

            if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
              echo "Routed CI completion for PR #${PR_NUMBER} to ${AGENT_NAME} via mTLS"
            else
              echo "Agent ${AGENT_NAME} unreachable via mTLS for PR #${PR_NUMBER} (rc=$CURL_RC HTTP=$HTTP_CODE); not marking agent-offline on CI-completion path"
            fi
          done

  # ─── LABEL CLEANUP ON CLOSE ───
  cleanup-labels:
    if: >
      (github.event_name == 'issues') &&
      (github.event.action == 'closed')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Remove status labels
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          for LABEL in in-progress in-review blocked; do
            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "$LABEL" 2>/dev/null || true
          done
          echo "Cleaned status labels from issue #${ISSUE_NUMBER}"
