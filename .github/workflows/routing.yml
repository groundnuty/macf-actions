# Self-routing for groundnuty/macf-actions.
#
# This repo hosts the reusable agent-router.yml workflow. When events fire
# on THIS repo (issues/comments/PRs), we route them via our own reusable
# workflow so @mentions reach agents' tmux sessions — same as consuming repos.
name: Self Routing

on:
  issues:
    types: [labeled, closed]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  pull_request_review:
    types: [submitted]
  # CI-completion routing (#6). Fires the route-by-ci-completion job
  # in the reusable workflow to notify agent-authored PRs when CI
  # finishes, eliminating the wait-for-human-ping polling pattern.
  check_suite:
    types: [completed]

# Caller must grant at least what the reusable workflow expects
# (see groundnuty/macf-actions/.github/workflows/agent-router.yml's
# `permissions:` block). Without this, GitHub's strict permission-inheritance
# rejects the workflow_call with "is only allowed 'issues: none, ...'".
permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  route:
    uses: groundnuty/macf-actions/.github/workflows/agent-router.yml@main
    secrets: inherit
