# Self-routing for groundnuty/macf-actions.
#
# This repo hosts the reusable agent-router.yml workflow. When events fire
# on THIS repo (issues/comments/PRs), we route them via our own reusable
# workflow so @mentions reach agents' tmux sessions — same as consuming repos.
name: Self Routing

on:
  issues:
    types: [labeled, closed]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  pull_request_review:
    types: [submitted]
  # CI-completion routing (#6). Fires the route-by-ci-completion job
  # in the reusable workflow to notify agent-authored PRs when CI
  # finishes, eliminating the wait-for-human-ping polling pattern.
  check_suite:
    types: [completed]

# Caller must grant at least what the reusable workflow expects
# (see groundnuty/macf-actions/.github/workflows/agent-router.yml's
# `permissions:` block). Without this, GitHub's strict permission-inheritance
# rejects the workflow_call with "is only allowed 'issues: none, ...'".
permissions:
  contents: read
  issues: write
  pull-requests: read
  # `checks: read` is required for route-by-ci-completion (#6) to
  # enumerate check_runs in a completed suite. Callers of this reusable
  # workflow who subscribe to `check_suite` MUST grant this or the
  # failing-check name lookup will 403. See CHANGELOG 1.1.0.
  checks: read

jobs:
  route:
    # Pinned to v1.3.0 (SSH+tmux transport) during the v2 rollout.
    # Bump to @v2.0.0 after:
    #   1. Setting the ROUTING_CLIENT_CERT + ROUTING_CLIENT_KEY secrets
    #      (values from `macf certs issue-routing-client` on a workspace
    #       that has the project CA key)
    #   2. Setting the PROJECT_CA_CERT repo Variable (public CA PEM)
    #   3. Adding `port` fields to each agent in agent-config.json
    #      (port the agent's channel server listens on)
    # See macf-actions#8 + CHANGELOG v2.0.0 for details.
    uses: groundnuty/macf-actions/.github/workflows/agent-router.yml@v1.3.0
    secrets: inherit
