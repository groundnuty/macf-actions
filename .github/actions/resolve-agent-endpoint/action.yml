name: Resolve agent endpoint from registry
description: >-
  Reads an agent's host + port from the MACF registry (GitHub Variables
  per DR-005/DR-006/DR-007). Replaces the v2.0.1 pattern of reading port
  from caller's agent-config.json, which violated DR-007.

  Variable name is derived deterministically from project + agent-name
  using the same transform as `toVariableSegment` in groundnuty/macf:
  uppercase + hyphen→underscore. Example:

    project=academic-resume, agent-name=code-agent
    → variable ACADEMIC_RESUME_AGENT_CODE_AGENT

inputs:
  project:
    description: Project name (e.g., academic-resume). Must not be empty.
    required: true
  agent-name:
    description: Agent name (e.g., code-agent). Must not be empty.
    required: true
  registry-api-path:
    description: >-
      GitHub REST API path prefix for the registry, WITHOUT trailing
      /actions/variables. Covers all three DR-006 scopes:
        org:     /orgs/<org>
        profile: /repos/<user>/<user>
        repo:    /repos/<owner>/<repo>
    required: true
  registry-token:
    description: >-
      GitHub token with variables:read on the registry scope. Mint via
      actions/create-github-app-token@v3 with a variables-read-only App
      (per the MACF_ROUTING_APP convention) to bound blast radius.
    required: true
outputs:
  host:
    description: Agent host (from registry entry .host)
    value: ${{ steps.resolve.outputs.host }}
  port:
    description: Agent port (from registry entry .port)
    value: ${{ steps.resolve.outputs.port }}
runs:
  using: composite
  steps:
    - name: Resolve endpoint from registry
      id: resolve
      shell: bash
      env:
        RAW_PROJECT: ${{ inputs.project }}
        RAW_AGENT: ${{ inputs.agent-name }}
        REG_PATH: ${{ inputs.registry-api-path }}
        GH_TOKEN: ${{ inputs.registry-token }}
      run: |
        set -euo pipefail

        # Fail-loud on empty inputs. `${var:?msg}` triggers on both unset
        # and null, catching the empty-string case that `set -u` alone
        # misses (see macf-actions#18 delta sign-off).
        : "${RAW_PROJECT:?project must not be empty}"
        : "${RAW_AGENT:?agent-name must not be empty}"
        : "${REG_PATH:?registry-api-path must not be empty}"
        : "${GH_TOKEN:?registry-token must not be empty}"

        # toVariableSegment() equivalent: uppercase + hyphen→underscore.
        # Mirrors src/registry/variable-name.ts in groundnuty/macf. Drift
        # between the two is guarded by the canonical-vector tests in
        # both repos — see test/resolve-agent-endpoint-transform.sh here
        # and test/registry/variable-name.test.ts on macf-side.
        project_seg=$(printf '%s' "$RAW_PROJECT" | tr '[:lower:]-' '[:upper:]_')
        agent_seg=$(printf '%s' "$RAW_AGENT" | tr '[:lower:]-' '[:upper:]_')
        var_name="${project_seg}_AGENT_${agent_seg}"

        # Registry-miss surfaces as a non-zero from `gh api` (404). We
        # swallow stderr to keep the error message clean — the ::error::
        # annotation is the actionable signal.
        if ! ENTRY=$(gh api "${REG_PATH}/actions/variables/${var_name}" --jq '.value' 2>/dev/null); then
          echo "::error::Registry miss: variable ${var_name} not found under ${REG_PATH}"
          exit 1
        fi

        HOST=$(echo "$ENTRY" | jq -r '.host // empty')
        PORT=$(echo "$ENTRY" | jq -r '.port // empty')
        if [ -z "$HOST" ] || [ -z "$PORT" ]; then
          echo "::error::Registry entry ${var_name} missing host or port (got host=${HOST:-<empty>} port=${PORT:-<empty>})"
          exit 1
        fi

        echo "host=${HOST}" >> "$GITHUB_OUTPUT"
        echo "port=${PORT}" >> "$GITHUB_OUTPUT"
